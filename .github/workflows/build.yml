name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: windows-latest
            target: Win32
          - os: ubuntu-latest
            target: Android32

    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Geode CLI
        uses: geode-sdk/cli/.github/actions/setup@main

      - name: Manual SDK Installation and Build
        run: |
          mkdir gd_folder
          geode profile add --name compiler_profile gd_folder
          geode profile select compiler_profile
          geode sdk install v5.0.0
          cmake -B build -T ClangCL -A ${{ matrix.config.target == 'Win32' && 'Win32' || '' }} -DGeode_DIR="${{ github.workspace }}/sdk"
          cmake --build build --config Release
          
