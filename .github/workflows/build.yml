name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: windows-latest
            target: Win32
          - os: ubuntu-latest
            target: Android32

    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Geode CLI and SDK
        uses: geode-sdk/cli/.github/actions/setup@main

      - name: Configure and Package Mod
        run: |
          geode config setup
          geode sdk install v5.0.0
          cmake -B build -T ${{ matrix.config.os == 'windows-latest' && 'ClangCL' || '' }} -A ${{ matrix.config.target == 'Win32' && 'Win32' || '' }}
          cmake --build build --config Release
          
