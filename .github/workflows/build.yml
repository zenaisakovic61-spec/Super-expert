name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: android

    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/actions/build@main
        with:
          platform: ${{ matrix.config.platform }}
          sdk: v5.8.2
          
