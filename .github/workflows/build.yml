name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: windows-latest
            target: Win32
          - os: ubuntu-latest
            target: Android32

    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Extract Geode SDK v5.0.0
        run: |
          curl -L https://github.com -o geode.tar.gz
          tar -xzf geode.tar.gz
          mv geode-5.0.0 geode-sdk-local

      - name: Configure and Build Mod
        run: |
          cmake -B build -T ${{ matrix.config.os == 'windows-latest' && 'ClangCL' || '' }} -A ${{ matrix.config.target == 'Win32' && 'Win32' || '' }} -DGeode_DIR="${{ github.workspace }}/geode-sdk-local"
          cmake --build build --config Release
          
